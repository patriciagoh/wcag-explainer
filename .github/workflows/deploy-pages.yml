name: Deploy app + docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: template/package-lock.json

      - name: Install & build the app
        working-directory: template
        env:
          # Served from https://patriciagoh.github.io/wcag-explainer/
          VITE_BASE: /wcag-explainer/
        run: |
          npm ci
          npm run build

      - name: Assemble site (app at root, docs under /docs)
        run: |
          rm -rf _site
          mkdir -p _site/docs
          cp -r template/dist/. _site/
          cp docs/*.html docs/styles.css docs/tokens.css docs/fonts.css _site/docs/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
